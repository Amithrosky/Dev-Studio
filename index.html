<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compile Studio</title>

    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', 'system-ui', 'sans-serif'],
                        mono: ['"SF Mono"', 'Menlo', 'monospace']
                    }
                }
            }
        }
    </script>

    <!-- CodeMirror Core & Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    
    <!-- CodeMirror Search/Dialog Addons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.css">

    <!-- CodeMirror Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    
    <!-- Search Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/search.min.js"></script>

    <!-- HTML Beautify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify-html.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* * iOS 26 Futuristic Styles & "1 Trillion Animations" */
        :root {
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth: cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Animated Mesh Gradient Blobs */
        @keyframes blob1 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(15vw, 15vh) scale(1.2) rotate(45deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }
        @keyframes blob2 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(-15vw, 20vh) scale(1.3) rotate(-45deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }
        .animate-blob1 { animation: blob1 15s infinite alternate var(--smooth); }
        .animate-blob2 { animation: blob2 18s infinite alternate var(--smooth); }

        /* VisionOS Glassmorphism */
        .glass {
            background: rgba(30, 30, 35, 0.45);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.5s var(--smooth);
        }
        .light-theme .glass {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.8);
        }

        /* Universal Spring Button */
        .ios-btn {
            transition: all 0.4s var(--spring);
            transform-origin: center;
            cursor: pointer;
        }
        .ios-btn:active {
            transform: scale(0.88) !important;
        }

        /* Pulse & Shimmer Effects */
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .run-btn-anim {
            background: linear-gradient(120deg, #ffffff, #cbd5e1, #ffffff);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }
        .light-theme .run-btn-anim {
            background: linear-gradient(120deg, #0f172a, #334155, #0f172a);
            color: #fff !important;
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 15px rgba(99,102,241,0.5); transform: scale(1); }
            to { box-shadow: 0 0 35px rgba(217,70,239,0.8); transform: scale(1.05); }
        }
        .logo-pulse {
            animation: pulseGlow 3s var(--spring) infinite alternate;
        }

        /* Staggered Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes slideUpTab {
            from { opacity: 0; transform: translateY(20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .stagger-1 { animation: slideUp 0.8s var(--spring) 0.1s both; }
        .stagger-2 { animation: slideUp 0.8s var(--spring) 0.2s both; }
        .stagger-3 { animation: slideUp 0.8s var(--spring) 0.3s both; }
        .spring-anim { transition: all 0.6s var(--spring) !important; }

        /* CodeMirror Custom iOS Integration - FIXED SELECTOR */
        #editorPane .CodeMirror {
            position: absolute !important;
            inset: 0 !important;
            height: 100% !important;
            width: 100% !important;
            border-radius: 1.5rem !important;
            background: transparent !important;
            font-size: 15px;
            padding: 0.5rem;
        }
        .CodeMirror-vscrollbar, .CodeMirror-hscrollbar {
            display: none !important;
        }
        .CodeMirror-gutters {
            background: transparent !important;
            border-right: 1px solid rgba(255,255,255,0.05) !important;
        }
        .light-theme .CodeMirror-gutters { border-right: 1px solid rgba(0,0,0,0.05) !important; }

        /* Search Dialog Overrides */
        .CodeMirror-dialog {
            background: rgba(30, 30, 35, 0.85) !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            color: #fff !important;
            border-radius: 1rem !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            padding: 10px 15px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5) !important;
            font-family: inherit !important;
            z-index: 50 !important;
        }
        .light-theme .CodeMirror-dialog {
            background: rgba(255, 255, 255, 0.85) !important;
            color: #000 !important;
            border: 1px solid rgba(0,0,0,0.15) !important;
        }
        .CodeMirror-dialog input {
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: inherit !important;
            border-radius: 0.5rem !important;
            padding: 6px 12px !important;
            outline: none !important;
            font-family: monospace !important;
        }
        .CodeMirror-dialog button {
            background: rgba(255,255,255,0.1) !important;
            border: none !important;
            border-radius: 0.5rem !important;
            padding: 6px 12px !important;
            color: inherit !important;
            cursor: pointer !important;
            transition: all 0.2s !important;
        }
        .CodeMirror-dialog button:hover { background: rgba(255,255,255,0.2) !important; }
        
        /* Hide default scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Console Logs */
        .log-entry {
            animation: slideUp 0.4s var(--spring) both;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid rgba(255,255,255,0.2);
            margin-bottom: 0.5rem;
        }
        .light-theme .log-entry { background: rgba(0,0,0,0.03); border-left-color: rgba(0,0,0,0.2); color: #333; }
        .log-error { border-left-color: #ef4444; color: #fca5a5; background: rgba(239, 68, 68, 0.05); }
        .log-warn { border-left-color: #f59e0b; color: #fcd34d; background: rgba(245, 158, 11, 0.05); }

        /* UI Enhancements */
        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.4s var(--smooth); backdrop-filter: blur(25px); z-index: 9999; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { transform: scale(0.85) translateY(20px); opacity: 0; transition: all 0.5s var(--spring); }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }
        
        .context-menu { opacity: 0; transform: scale(0.9) translateY(-10px); pointer-events: none; transition: all 0.3s var(--spring); transform-origin: top left; z-index: 9998; }
        .context-menu.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        
        .preview-mobile { width: 100% !important; max-width: 375px !important; margin: 0 auto !important; border-radius: 2.5rem !important; border: 8px solid #1e293b !important; }
        .light-theme .preview-mobile { border-color: #e2e8f0 !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="text-slate-200 selection:bg-fuchsia-500/30 font-sans">

    <!-- Fluid Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1] bg-slate-950 transition-colors duration-700" id="mainBg">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-indigo-600/40 rounded-full blur-[120px] mix-blend-screen animate-blob1"></div>
        <div class="absolute top-[20%] right-[-10%] w-[40vw] h-[40vw] bg-fuchsia-600/40 rounded-full blur-[120px] mix-blend-screen animate-blob2" style="animation-delay: 2s"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] bg-blue-600/40 rounded-full blur-[120px] mix-blend-screen animate-blob1" style="animation-delay: 4s; animation-direction: reverse;"></div>
    </div>

    <!-- Global Modals & Overlays -->
    <div id="modalOverlay" class="modal-overlay fixed inset-0 bg-black/60 flex items-center justify-center p-4">
        <div class="modal-content glass w-full max-w-md rounded-[2.5rem] p-6 border border-white/20 shadow-2xl flex flex-col gap-4">
            <div class="flex items-center gap-3 text-white">
                <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-indigo-400"></i>
                </div>
                <h2 id="modalTitle" class="text-xl font-bold tracking-tight">System Message</h2>
            </div>
            <p id="modalDesc" class="text-slate-300 text-sm leading-relaxed pl-1"></p>
            <input type="text" id="modalInput" class="hidden w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition-colors font-mono text-sm" placeholder="Enter value...">
            <div class="flex gap-3 mt-2">
                <button onclick="modal.close()" class="flex-1 py-3 rounded-2xl bg-white/5 hover:bg-white/10 text-slate-300 font-semibold transition-colors ios-btn">Cancel</button>
                <button onclick="modal.confirm()" class="flex-1 py-3 rounded-2xl bg-indigo-500 hover:bg-indigo-400 text-white font-bold shadow-lg shadow-indigo-500/25 transition-colors ios-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Tab Context Menu -->
    <div id="contextMenu" class="context-menu fixed glass rounded-2xl p-1.5 w-48 border border-white/10 shadow-2xl flex flex-col gap-1">
        <button onclick="actions.triggerRename()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-white/10 flex items-center gap-3 text-sm font-medium text-slate-200 ios-btn">
            <i data-lucide="edit-2" class="w-4 h-4 text-indigo-400"></i> Rename File
        </button>
        <div class="h-px bg-white/5 my-0.5 mx-2"></div>
        <button onclick="actions.triggerDelete()" class="w-full text-left px-3 py-2 rounded-xl hover:bg-red-500/20 flex items-center gap-3 text-sm font-medium text-red-400 ios-btn">
            <i data-lucide="trash-2" class="w-4 h-4"></i> Delete File
        </button>
    </div>

    <!-- Main Application Wrapper -->
    <div class="h-screen w-screen flex flex-col p-3 md:p-5 gap-4 relative overflow-hidden">
        
        <!-- Glass Navigation Bar -->
        <nav class="glass rounded-[2rem] p-3 flex items-center justify-between stagger-1 z-50">
            <!-- Logo Section -->
            <div class="flex items-center gap-3 pl-2 pr-4 md:border-r border-white/10 shrink-0">
                <div class="logo-pulse w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-fuchsia-500 flex items-center justify-center shadow-lg">
                    <i data-lucide="Computer" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="hidden md:block text-xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">CS</h1>
            </div>
            
            <!-- Dynamic Tab Bar -->
            <div class="flex-1 overflow-x-auto flex items-center gap-3 px-4 no-scrollbar pb-1" id="tabContainer">
                <!-- Tabs rendered by JS -->
            </div>
            
            <!-- Add Tab Button -->
            <button onclick="addTab()" class="ios-btn w-10 h-10 rounded-full glass flex items-center justify-center text-slate-300 hover:text-white shrink-0 mr-2 md:mr-4 shadow-sm border border-white/10">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
            
            <!-- Contextual Actions -->
            <div class="flex items-center gap-2 pr-2 md:border-l border-white/10 md:pl-4 shrink-0">
                <button onclick="formatCode()" class="hidden md:flex ios-btn px-4 py-2 rounded-full glass text-sm font-semibold items-center gap-2 text-indigo-300 hover:text-white hover:bg-indigo-500/20 border border-white/5">
                    <i data-lucide="wand-2" class="w-4 h-4"></i> Format
                </button>
                <button id="runBtn" onclick="runCode()" class="ios-btn run-btn-anim px-5 py-2 rounded-full text-black text-sm font-bold flex items-center gap-2 shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                    <i data-lucide="play" class="w-4 h-4 fill-current"></i> Run
                </button>

                <!-- Settings Dropdown Wrapper -->
                <div class="relative ml-2">
                    <button id="settingsBtn" onclick="toggleSettings()" class="ios-btn w-10 h-10 rounded-full glass flex items-center justify-center text-slate-300 hover:text-white shadow-sm border border-white/10">
                        <i data-lucide="settings" class="w-5 h-5 transition-transform duration-500" id="settingsIcon"></i>
                    </button>
                    <!-- Settings Menu -->
                    <div id="settingsMenu" class="absolute top-14 right-0 w-64 glass rounded-[2rem] p-3 opacity-0 pointer-events-none transform scale-90 translate-y-[-10px] origin-top-right transition-all duration-500 var(--spring) shadow-2xl flex flex-col gap-1 border border-white/10 z-50">
                        <div class="px-3 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">Preferences</div>
                        <div class="flex items-center justify-between p-3 bg-white/5 hover:bg-white/10 rounded-2xl cursor-pointer ios-btn border border-white/5" onclick="toggleTheme()">
                            <div class="flex items-center gap-3 text-slate-200 text-sm font-semibold">
                                <i data-lucide="moon" class="w-4 h-4 text-indigo-400" id="themeIcon"></i> Theme
                            </div>
                            <div class="w-12 h-6 rounded-full bg-indigo-500 relative transition-colors duration-300 p-0.5 shadow-inner" id="themeBg">
                                <div id="themeHandle" class="w-5 h-5 rounded-full bg-white shadow-md transform translate-x-6 transition-transform duration-400 var(--spring)"></div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 bg-white/5 hover:bg-white/10 rounded-2xl cursor-pointer ios-btn border border-white/5" onclick="toggleAutoRun()">
                            <div class="flex items-center gap-3 text-slate-200 text-sm font-semibold">
                                <i data-lucide="zap" class="w-4 h-4 text-fuchsia-400"></i> Auto Run
                            </div>
                            <div class="w-12 h-6 rounded-full bg-fuchsia-500 relative transition-colors duration-300 p-0.5 shadow-inner" id="autoRunBg">
                                <div id="autoRunHandle" class="w-5 h-5 rounded-full bg-white shadow-md transform translate-x-6 transition-transform duration-400 var(--spring)"></div>
                            </div>
                        </div>
                        
                        <div class="h-px bg-white/10 my-1 mx-2"></div>
                        <div class="px-3 py-2 text-xs font-bold text-slate-500 uppercase tracking-wider">System</div>
                        
                        <div class="flex items-center justify-between p-3 bg-white/5 hover:bg-white/10 rounded-2xl cursor-pointer ios-btn border border-white/5" onclick="actions.download()">
                            <div class="flex items-center gap-3 text-emerald-400 text-sm font-semibold">
                                <i data-lucide="download" class="w-4 h-4"></i> Download File
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 bg-white/5 hover:bg-white/10 rounded-2xl cursor-pointer ios-btn border border-white/5" onclick="actions.about()">
                            <div class="flex items-center gap-3 text-blue-400 text-sm font-semibold">
                                <i data-lucide="info" class="w-4 h-4"></i> About Studio
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 bg-red-500/10 hover:bg-red-500/20 rounded-2xl cursor-pointer ios-btn border border-red-500/10 mt-1" onclick="actions.factoryReset()">
                            <div class="flex items-center gap-3 text-red-400 text-sm font-semibold">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Factory Reset
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        
        <!-- Main Workspace Area - Mobile scroll enabled -->
        <div class="flex-1 flex flex-col md:flex-row gap-4 min-h-0 overflow-y-auto md:overflow-hidden no-scrollbar pb-4 md:pb-0">
            
            <!-- Code Editor Pane -->
            <div id="editorPane" class="min-h-[50vh] md:min-h-0 flex-1 glass rounded-[2.5rem] p-3 flex flex-col relative stagger-2 overflow-hidden spring-anim">
                <div class="relative flex-1 rounded-[1.5rem] overflow-hidden bg-black/20 dark:bg-black/40 shadow-inner">
                    <textarea id="codeEditor"></textarea>
                </div>
                
                <!-- Status Bar -->
                <div class="h-10 mt-2 px-4 rounded-full bg-white/5 border border-white/10 flex items-center justify-between text-xs font-mono text-slate-400 shrink-0">
                    <div class="flex items-center gap-4">
                        <span id="cursorPos" class="flex items-center gap-1.5"><i data-lucide="crosshair" class="w-3 h-3"></i> Ln 1, Col 1</span>
                        <span class="hidden md:inline-block opacity-50">|</span>
                        <span id="docSize" class="hidden md:flex items-center gap-1.5"><i data-lucide="file-digit" class="w-3 h-3"></i> 0 Bytes</span>
                    </div>
                    <div class="flex items-center">
                        <span class="px-2 py-1 rounded-md bg-white/5 text-slate-300 mr-4">HTML Mixed</span>
                        <!-- Find & Replace Buttons added here -->
                        <div class="hidden sm:flex items-center gap-3 border-r border-white/10 pr-4 mr-4">
                            <button onclick="editor.execCommand('find')" class="hover:text-white transition-colors" title="Find (Ctrl-F)"><i data-lucide="search" class="w-3.5 h-3.5"></i></button>
                            <button onclick="editor.execCommand('replace')" class="hover:text-white transition-colors" title="Replace (Shift-Ctrl-F)"><i data-lucide="replace" class="w-3.5 h-3.5"></i></button>
                        </div>
                        <span id="saveStatus" class="flex items-center gap-1.5 text-emerald-400 opacity-0 transition-opacity duration-300"><i data-lucide="check-circle-2" class="w-3 h-3"></i> Saved</span>
                    </div>
                </div>
            </div>
            
            <!-- Interactive Preview Pane -->
            <div id="previewPane" class="min-h-[50vh] md:min-h-0 flex-1 glass rounded-[2.5rem] p-3 flex flex-col relative stagger-3 transition-all duration-500 z-40">
                
                <!-- Browser Toolbar -->
                <div class="h-14 mb-3 rounded-full bg-white/5 border border-white/10 flex items-center justify-between px-2 shrink-0 z-10 backdrop-blur-md">
                    <div class="flex items-center gap-1">
                        <button class="ios-btn w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <button class="ios-btn w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                        <button onclick="updatePreview()" class="ios-btn w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                    </div>
                    
                    <div class="flex-1 max-w-sm px-2 md:px-4">
                        <div class="w-full h-9 rounded-full bg-black/20 border border-white/5 flex items-center px-4 gap-2 text-sm text-slate-300 font-mono shadow-inner">
                            <i data-lucide="lock" class="w-3 h-3 text-emerald-400 shrink-0"></i>
                            <span class="truncate opacity-70">localhost:3000</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-1 bg-black/20 p-1 rounded-full border border-white/5">
                        <button onclick="browser.setDevice('desktop')" id="btnDesktop" class="ios-btn w-8 h-8 rounded-full flex items-center justify-center text-white bg-white/10 shadow-sm"><i data-lucide="monitor" class="w-4 h-4"></i></button>
                        <button onclick="browser.setDevice('mobile')" id="btnMobile" class="ios-btn w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:text-white"><i data-lucide="smartphone" class="w-4 h-4"></i></button>
                        <div class="w-px h-4 bg-white/10 mx-1"></div>
                        <!-- Fullscreen Toggle Button -->
                        <button onclick="browser.toggleFullscreen()" id="btnFullscreen" class="ios-btn w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:text-white"><i data-lucide="maximize" id="fullscreenIcon" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <!-- Iframe Wrapper for Snappy Animations -->
                <div id="frameWrapper" class="flex-1 relative rounded-[2rem] overflow-hidden bg-[#e2e8f0] dark:bg-white/90 backdrop-blur-3xl spring-anim shadow-[inset_0_0_20px_rgba(0,0,0,0.1)] border border-white/20 transition-all duration-500">
                    <iframe id="previewFrame" class="absolute inset-0 w-full h-full border-0 bg-transparent pointer-events-auto"></iframe>
                </div>
                
                <!-- Floating Console Drawer Inside Preview Pane -->
                <div id="consoleOverlay" class="absolute bottom-4 left-4 right-4 h-[45%] glass rounded-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.4)] border border-white/20 transform translate-y-[120%] spring-anim flex flex-col z-20 opacity-0 pointer-events-none">
                    <!-- Console Header -->
                    <div class="px-5 py-3 border-b border-white/10 flex justify-between items-center bg-white/5">
                        <div class="flex items-center gap-2">
                            <i data-lucide="terminal-square" class="w-4 h-4 text-fuchsia-400"></i>
                            <span class="text-sm font-bold text-slate-200 tracking-wide">Developer Console</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="clearConsole()" class="ios-btn p-1.5 rounded-full hover:bg-white/20 text-slate-300">
                                <i data-lucide="ban" class="w-4 h-4"></i>
                            </button>
                            <button onclick="toggleConsole()" class="ios-btn p-1.5 rounded-full hover:bg-white/20 text-slate-300">
                                <i data-lucide="minimize-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <!-- Log Entries Container -->
                    <div id="consoleLog" class="flex-1 overflow-y-auto p-4 text-slate-200 font-mono text-sm no-scrollbar pb-10">
                        <div class="opacity-50 text-xs italic text-center mt-4">Console is ready...</div>
                    </div>
                </div>
                
                <!-- Console Launch Button -->
                <button onclick="toggleConsole()" class="absolute bottom-8 right-8 ios-btn px-5 py-3 rounded-full bg-black/80 backdrop-blur-2xl text-white text-sm font-bold flex items-center gap-2 shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-white/10 hover:bg-black group z-30">
                    <i data-lucide="terminal" class="w-4 h-4 text-fuchsia-400 group-hover:rotate-12 transition-transform duration-300"></i> Console
                    <!-- iOS style notification badge -->
                    <div id="errBadge" class="hidden absolute -top-1.5 -right-1.5 w-[22px] h-[22px] bg-red-500 rounded-full text-[10px] items-center justify-center shadow-lg shadow-red-500/50 border-2 border-slate-900">0</div>
                </button>
            </div>
            
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // --- STATE & DATA ---
        let files = [{
            id: '1',
            name: 'vision.html',
            content: `<!-- iOS 26 Hyper-Animated Experience -->
<style>
  body {
    margin: 0; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    background: #000; font-family: -apple-system, sans-serif;
    overflow: hidden;
  }
  .card {
    width: 320px; height: 420px;
    border-radius: 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    animation: float 6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .card:active {
    transform: scale(0.92) translateY(-10px);
  }
  .orb {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ec4899, #6366f1);
    box-shadow: 0 0 50px rgba(236,72,153,0.6);
    animation: morph 8s ease-in-out infinite alternate;
  }
  h1 {
    color: #fff; margin-top: 35px; font-weight: 800; font-size: 28px;
    letter-spacing: -1px; text-shadow: 0 4px 20px rgba(255,255,255,0.3);
  }
  p {
    color: #94a3b8; font-size: 14px; margin-top: 10px;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
  }
  @keyframes morph {
    0% { border-radius: 50%; transform: scale(1) rotate(0); }
    100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: scale(1.15) rotate(45deg); box-shadow: 0 0 80px rgba(99,102,241,0.8); }
  }
</style>
<div class="card" onclick="console.log('Interaction logged: Card tapped!')">
  <div class="orb"></div>
  <h1>Future Interface</h1>
  <p>Tap card to test console</p>
</div>
<script>
  console.log("System initializing...");
  setTimeout(() => console.info("Vision engine loaded at 120Hz."), 800);
  setTimeout(() => console.warn("Simulated environment active."), 1600);
<\/script>`
        }];
        
        let activeId = '1';
        let editor;
        let isAutoRun = true;
        let isDark = true;
        let debounceTimer;
        let isConsoleOpen = false;
        let errCount = 0;
        let isSwitching = false;

        const $ = id => document.getElementById(id);

        // --- CUSTOM MODALS & MENUS ---
        const modal = {
            cb: null,
            show: (title, desc, type = 'confirm', callback = null, defaultVal = '') => {
                $('modalTitle').innerText = title;
                $('modalDesc').innerText = desc;
                const input = $('modalInput');
                if (type === 'prompt') {
                    input.style.display = 'block';
                    input.value = defaultVal;
                    setTimeout(() => input.focus(), 100);
                } else {
                    input.style.display = 'none';
                }
                modal.cb = callback;
                $('modalOverlay').classList.add('active');
            },
            close: () => {
                $('modalOverlay').classList.remove('active');
                modal.cb = null;
            },
            confirm: () => {
                const val = $('modalInput').value;
                if (modal.cb) modal.cb(val);
                modal.close();
            }
        };

        const contextMenu = {
            targetId: null,
            show: (e, id) => {
                e.preventDefault();
                contextMenu.targetId = id;
                const menu = $('contextMenu');
                let x = e.pageX;
                let y = e.pageY;
                if (x + 192 > window.innerWidth) x = window.innerWidth - 200;
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';
                menu.classList.add('active');
            },
            hide: () => {
                $('contextMenu').classList.remove('active');
            }
        };

        const browser = {
            isFullscreen: false,
            setDevice: (type) => {
                const wrapper = $('frameWrapper');
                const btnDesktop = $('btnDesktop');
                const btnMobile = $('btnMobile');
                
                if(type === 'mobile') {
                    wrapper.classList.add('preview-mobile');
                    btnMobile.classList.replace('text-slate-500', 'text-white');
                    btnMobile.classList.add('bg-white/10', 'shadow-sm');
                    btnDesktop.classList.replace('text-white', 'text-slate-500');
                    btnDesktop.classList.remove('bg-white/10', 'shadow-sm');
                } else {
                    wrapper.classList.remove('preview-mobile');
                    btnDesktop.classList.replace('text-slate-500', 'text-white');
                    btnDesktop.classList.add('bg-white/10', 'shadow-sm');
                    btnMobile.classList.replace('text-white', 'text-slate-500');
                    btnMobile.classList.remove('bg-white/10', 'shadow-sm');
                }
            },
            toggleFullscreen: () => {
                const pane = $('previewPane');
                const icon = $('fullscreenIcon');
                const btn = $('btnFullscreen');
                browser.isFullscreen = !browser.isFullscreen;
                
                if (browser.isFullscreen) {
                    pane.classList.remove('relative', 'flex-1', 'rounded-[2.5rem]', 'min-h-[50vh]', 'md:min-h-0');
                    pane.classList.add('fixed', 'inset-0', 'z-[100]', 'rounded-none', 'm-0');
                    icon.setAttribute('data-lucide', 'minimize');
                    btn.classList.add('bg-white/10', 'text-white');
                    btn.classList.remove('text-slate-500');
                } else {
                    pane.classList.add('relative', 'flex-1', 'rounded-[2.5rem]', 'min-h-[50vh]', 'md:min-h-0');
                    pane.classList.remove('fixed', 'inset-0', 'z-[100]', 'rounded-none', 'm-0');
                    icon.setAttribute('data-lucide', 'maximize');
                    btn.classList.remove('bg-white/10', 'text-white');
                    btn.classList.add('text-slate-500');
                }
                lucide.createIcons();
                // Ensure frame sizes correctly update
                setTimeout(updatePreview, 300);
            }
        };

        // --- ADVANCED ACTIONS ---
        const actions = {
            triggerRename: () => {
                const id = contextMenu.targetId;
                contextMenu.hide();
                if (!id) return;
                const file = files.find(f => f.id === id);
                modal.show("Rename File", "Enter a new name for this document:", "prompt", (newVal) => {
                    if (newVal && newVal.trim()) {
                        file.name = newVal.trim();
                        renderTabs();
                    }
                }, file.name);
            },
            triggerDelete: () => {
                const id = contextMenu.targetId;
                contextMenu.hide();
                if (!id) return;
                if (files.length <= 1) {
                    modal.show("Cannot Delete", "You must have at least one file open.", "confirm");
                    return;
                }
                modal.show("Delete File", `Are you sure you want to permanently delete this file?`, "confirm", () => {
                    closeTab(id);
                });
            },
            factoryReset: () => {
                toggleSettings();
                modal.show("Factory Reset", "This will wipe all your custom files and restore defaults. Are you sure?", "confirm", () => {
                    files = [files[0]];
                    files[0].content = `<!-- Reset to Defaults -->\n<h1>Welcome Back</h1>`;
                    activeId = files[0].id;
                    renderTabs();
                    switchTab(activeId);
                });
            },
            about: () => {
                toggleSettings();
                modal.show("Studio 26", "A futuristic, hyper-animated code playground inspired by visionOS. All systems operational.", "confirm");
            },
            download: () => {
                toggleSettings();
                const file = files.find(f => f.id === activeId);
                const blob = new Blob([editor.getValue()], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = file.name;
                a.click();
            }
        };

        // --- INITIALIZATION ---
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            
            // Initialize CodeMirror
            editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
                mode: 'htmlmixed',
                theme: 'dracula',
                lineNumbers: true,
                autoCloseTags: true,
                autoCloseBrackets: true,
                lineWrapping: true,
                extraKeys: {"Ctrl-F": "findPersistent"}
            });
            
            editor.setValue(files[0].content);
            
            editor.on('change', () => {
                if (isSwitching) return;
                saveCode();
                if(isAutoRun) {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(updatePreview, 800);
                }
            });

            // Status Bar Updates
            editor.on('cursorActivity', () => {
                const pos = editor.getCursor();
                $('cursorPos').innerHTML = `<i data-lucide="crosshair" class="w-3 h-3"></i> Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
                lucide.createIcons({root: $('cursorPos')});
            });

            renderTabs();
            setTimeout(updatePreview, 100);

            // Listen for proxied console messages from the Iframe
            window.addEventListener('message', (e) => {
                if(e.data && e.data.source === 'ios26-console') {
                    appendLog(e.data.type, e.data.args);
                }
            });

            // Global Dismissals
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#contextMenu')) contextMenu.hide();
                const menu = document.getElementById('settingsMenu');
                if (menu && menu.style.opacity === '1' && !e.target.closest('#settingsMenu') && !e.target.closest('#settingsBtn')) {
                    toggleSettings();
                }
            });
        });

        // --- TAB MANAGEMENT ---
        function renderTabs() {
            const container = document.getElementById('tabContainer');
            // Track existing tabs to avoid replaying animation for everything
            const existingTabIds = new Set(Array.from(container.children).map(c => c.dataset.id));
            container.innerHTML = '';
            
            files.forEach((file, index) => {
                const isActive = file.id === activeId;
                const tab = document.createElement('div');
                tab.dataset.id = file.id;
                
                tab.className = `tab-item ios-btn flex items-center gap-2 px-4 py-2 rounded-full cursor-pointer text-sm font-medium transition-all duration-500 border shrink-0 
                    ${isActive ? 'bg-white/20 border-white/30 shadow-[0_0_20px_rgba(255,255,255,0.15)] scale-105' : 'bg-transparent border-transparent hover:bg-white/10'}`;
                
                // Only animate newly added tabs
                if(!existingTabIds.has(file.id)) {
                    tab.style.animation = `slideUpTab 0.5s var(--spring) both`;
                }

                tab.innerHTML = `
                    <i data-lucide="file-code" class="w-4 h-4 ${isActive ? 'text-white' : 'text-slate-400'}"></i>
                    <span class="truncate max-w-[120px] ${isActive ? 'text-white font-bold' : 'text-slate-400'}">${file.name}</span>
                    ${files.length > 1 ? `<button class="ios-btn ml-1 p-1 rounded-full hover:bg-black/30 ${isActive ? 'text-white hover:text-red-300' : 'text-slate-400 hover:text-red-400'}" onclick="event.stopPropagation(); closeTab('${file.id}')"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}
                `;
                
                tab.onclick = () => switchTab(file.id);
                tab.oncontextmenu = (e) => contextMenu.show(e, file.id);
                container.appendChild(tab);
            });
            lucide.createIcons({ root: container });
        }

        function switchTab(id) {
            if (activeId === id) return;
            saveCode();
            activeId = id;
            const file = files.find(f => f.id === activeId);
            
            isSwitching = true;
            editor.setValue(file.content || '');
            isSwitching = false;
            
            renderTabs();
            updatePreview();
        }

        function addTab() {
            const newId = Date.now().toString();
            files.push({
                id: newId,
                name: `Screen_${files.length + 1}.html`,
                content: `<style>\n  body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }\n  h1 { font-size: 3rem; background: linear-gradient(90deg, #6366f1, #ec4899); -webkit-background-clip: text; color: transparent; animation: pulse 2s infinite alternate; }\n  @keyframes pulse { to { transform: scale(1.1); filter: hue-rotate(30deg); } }\n</style>\n<h1>New App</h1>\n<script>\n  console.log("Started.");\n<\/script>`
            });
            switchTab(newId);
            
            // Smooth scroll to the new tab
            setTimeout(() => {
                const container = document.getElementById('tabContainer');
                container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
            }, 50);
        }

        function closeTab(id) {
            if(files.length === 1) return; 
            const idx = files.findIndex(f => f.id === id);
            files.splice(idx, 1);
            
            if(activeId === id) {
                activeId = files[Math.max(0, idx - 1)].id;
                isSwitching = true;
                editor.setValue(files.find(f => f.id === activeId).content);
                isSwitching = false;
                updatePreview();
            }
            renderTabs();
        }

        function saveCode() {
            const file = files.find(f => f.id === activeId);
            if(file) file.content = editor.getValue();
            
            const size = new Blob([editor.getValue()]).size;
            $('docSize').innerHTML = `<i data-lucide="file-digit" class="w-3 h-3"></i> ${size} Bytes`;
            lucide.createIcons({root: $('docSize')});

            const status = $('saveStatus');
            status.style.opacity = '1';
            clearTimeout(status.saveTimer);
            status.saveTimer = setTimeout(() => status.style.opacity = '0', 2000);
        }

        // --- PREVIEW ENGINE ---
        function runCode() {
            const btn = document.getElementById('runBtn');
            btn.style.transform = 'scale(0.85)';
            setTimeout(() => btn.style.transform = 'scale(1)', 400);
            updatePreview();
        }

        function updatePreview() {
            const frameWrapper = document.getElementById('frameWrapper');
            // Dramatic "iOS 26" snapshot flash animation
            frameWrapper.style.transform = 'scale(0.96)';
            frameWrapper.style.filter = 'blur(5px) brightness(1.1)';
            frameWrapper.style.opacity = '0.7';
            
            setTimeout(() => {
                const file = files.find(f => f.id === activeId);
                const code = file ? file.content : '';
                
                // Inject our custom console sniffer
                const consoleProxy = `<script>
                (function(){
                    const s = (t,a) => window.parent.postMessage({source:'ios26-console',type:t,args:a},'*');
                    ['log','error','warn','info'].forEach(m => {
                        const o = console[m];
                        console[m] = (...a) => { s(m,a); o.apply(console,a); };
                    });
                    window.onerror = (msg, url, line) => s('error', [msg + ' (Line ' + line + ')']);
                })();
                <\/script>`;
                
                const finalCode = code.includes('<head>') ? code.replace('<head>', '<head>' + consoleProxy) : consoleProxy + code;
                
                const iframe = document.getElementById('previewFrame');
                iframe.srcdoc = finalCode;
                
                // Restore frame visually
                frameWrapper.style.transform = 'scale(1)';
                frameWrapper.style.filter = 'blur(0px) brightness(1)';
                frameWrapper.style.opacity = '1';
            }, 350);
        }

        // --- CONSOLE ENGINE ---
        function toggleConsole() {
            const overlay = document.getElementById('consoleOverlay');
            isConsoleOpen = !isConsoleOpen;
            
            if(isConsoleOpen) {
                overlay.style.transform = 'translateY(0)';
                overlay.style.opacity = '1';
                overlay.style.pointerEvents = 'auto';
                errCount = 0; 
                updateErrBadge();
            } else {
                overlay.style.transform = 'translateY(120%)';
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
            }
        }

        function appendLog(type, args) {
            const logContainer = document.getElementById('consoleLog');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            
            // Format Arguments smoothly
            const msg = args.map(a => {
                if (typeof a === 'object') return JSON.stringify(a, null, 2);
                return String(a).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }).join(' ');
            
            // Contextual Icon mapping
            let icon = 'chevron-right';
            if(type === 'error') icon = 'x-circle';
            if(type === 'warn') icon = 'alert-triangle';
            if(type === 'info') icon = 'info';
            
            entry.innerHTML = `
                <div class="flex items-start gap-3">
                    <i data-lucide="${icon}" class="w-4 h-4 mt-0.5 shrink-0"></i>
                    <div class="flex-1 whitespace-pre-wrap break-all">${msg}</div>
                </div>
            `;
            
            logContainer.prepend(entry);
            lucide.createIcons({ root: entry });
            
            if (type === 'error' && !isConsoleOpen) {
                errCount++;
                updateErrBadge();
            }
        }

        function clearConsole() {
            const logContainer = document.getElementById('consoleLog');
            logContainer.innerHTML = '';
            errCount = 0;
            updateErrBadge();
        }

        function updateErrBadge() {
            const badge = document.getElementById('errBadge');
            if(errCount > 0) {
                badge.textContent = errCount > 9 ? '9+' : errCount;
                badge.style.display = 'flex';
                badge.classList.remove('animate-bounce');
                void badge.offsetWidth; 
                badge.classList.add('animate-bounce');
            } else {
                badge.style.display = 'none';
            }
        }

        // --- FORMATTING & CLEARING ---
        function formatCode() {
            const code = editor.getValue();
            const formatted = html_beautify(code, { indent_size: 4, wrap_line_length: 80 });
            isSwitching = true;
            editor.setValue(formatted);
            isSwitching = false;
            saveCode();
            
            // Beautiful haptic-like animation for format completion
            const editorEl = document.getElementById('editorPane');
            editorEl.style.transform = 'scale(0.96) rotate(-0.5deg)';
            editorEl.style.filter = 'brightness(1.5)';
            setTimeout(() => {
                editorEl.style.transform = 'scale(1) rotate(0deg)';
                editorEl.style.filter = 'brightness(1)';
            }, 350);
        }

        function clearCode() {
            toggleSettings(); 
            modal.show("Clear Workspace", "Are you sure you want to clear all code from the current tab?", "confirm", () => {
                isSwitching = true;
                editor.setValue('');
                isSwitching = false;
                saveCode();
                updatePreview();
                
                const editorEl = document.getElementById('editorPane');
                editorEl.style.transform = 'translateY(20px) scale(0.95)';
                editorEl.style.opacity = '0.5';
                setTimeout(() => {
                    editorEl.style.transform = 'translateY(0) scale(1)';
                    editorEl.style.opacity = '1';
                }, 400);
            });
        }

        // --- SETTINGS CONTROLS ---
        function toggleSettings() {
            const menu = document.getElementById('settingsMenu');
            const icon = document.getElementById('settingsIcon');
            if (menu.style.opacity === '1') {
                menu.style.opacity = '0';
                menu.style.transform = 'scale(0.9) translateY(-10px)';
                menu.style.pointerEvents = 'none';
                icon.style.transform = 'rotate(0deg)';
            } else {
                menu.style.opacity = '1';
                menu.style.transform = 'scale(1) translateY(0)';
                menu.style.pointerEvents = 'auto';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function toggleAutoRun() {
            isAutoRun = !isAutoRun;
            const bg = document.getElementById('autoRunBg');
            const handle = document.getElementById('autoRunHandle');
            if (isAutoRun) {
                bg.classList.replace('bg-white/20', 'bg-fuchsia-500');
                handle.style.transform = 'translateX(24px)';
            } else {
                bg.classList.replace('bg-fuchsia-500', 'bg-white/20');
                handle.style.transform = 'translateX(0px)';
            }
        }

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.classList.toggle('light-theme', !isDark);
            document.documentElement.classList.toggle('dark', isDark);
            
            const handle = document.getElementById('themeHandle');
            const bg = document.getElementById('themeBg');
            const icon = document.getElementById('themeIcon');
            const mainBg = document.getElementById('mainBg');
            const blobs = document.querySelectorAll('.animate-blob1, .animate-blob2');
            
            if(isDark) {
                handle.style.transform = 'translateX(24px)';
                bg.classList.replace('bg-slate-400', 'bg-indigo-500');
                icon.setAttribute('data-lucide', 'moon');
                editor.setOption('theme', 'dracula');
                mainBg.classList.replace('bg-slate-200', 'bg-slate-950');
                blobs.forEach(b => b.classList.replace('mix-blend-multiply', 'mix-blend-screen'));
            } else {
                handle.style.transform = 'translateX(0px)';
                bg.classList.replace('bg-indigo-500', 'bg-slate-400');
                icon.setAttribute('data-lucide', 'sun');
                editor.setOption('theme', 'neo');
                mainBg.classList.replace('bg-slate-950', 'bg-slate-200');
                blobs.forEach(b => b.classList.replace('mix-blend-screen', 'mix-blend-multiply'));
            }
            lucide.createIcons();
            renderTabs(); // Refresh active tab colors
        }
    </script>
</body>
</html>
